name: Release Check

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run test

      - name: Run CLI smoke checks
        run: npm run smoke

      - name: Validate publish tarball
        run: npm run pack:check

      - name: Print version to publish
        run: npm pkg get name version
